name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 主门禁：stable 上跑 fmt + clippy + test + release build。
  # test 已含工作流 A 的**差测试门禁**（A3）——`tools/codegen/tests/diff.rs` 在 `cargo test
  # --workspace` 内执行，对每题逐 hidden case 比对「解释器 oracle vs WASM 后端」等价 +
  # strip-assist artifact 层字节比对（A5）。真实 LLM 的 e2e / benchmark 是 example，不进门禁。
  check:
    name: fmt + clippy + test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test (含差测试 A3 + artifact 门禁 A5)
        run: cargo test --workspace --locked

      - name: Build (release)
        run: cargo build --workspace --release --locked

  # MSRV 守护：在 Cargo.toml 声明的 rust-version 上构建 + 测试，防止声明的 MSRV 静默腐烂
  # （历史上 rust-version 曾失真——见 docs/engineering_notes.md 2026-05-31 CI 接入条目）。
  # 仅 build + test（fmt / clippy 是版本无关的风格检查，已在主门禁覆盖）。
  msrv:
    name: build + test (MSRV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          ver=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([0-9.]+)".*/\1/')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "声明的 MSRV：$ver"

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build (MSRV)
        run: cargo build --workspace --locked

      - name: Test (MSRV)
        run: cargo test --workspace --locked
